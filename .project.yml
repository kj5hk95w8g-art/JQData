# JQData 项目元数据

name: JQData
description: 聚宽 JQData 本地化行情数据中台

# 继承的全局规则维度
inherits:
  - 001-git
  - 002-security
  - 003-python
  - 004-deployment
  - 005-documentation
  - 006-testing
  - 007-database

# 技术栈
tech_stack:
  primary: python
  databases:
    - clickhouse
    - redis
  infrastructure:
    - docker
    - nginx
    - fastapi

# 部署拓扑
deployment:
  server_d:
    host: 101.132.161.52
    role: 核心数据层
    config: 8核64GB
    services:
      - clickhouse
      - redis
      - fastapi
      - nginx
      - prometheus
      - node-exporter
  server_c:
    host: 139.196.186.67
    role: 可视化/调度
    config: 4核32GB
    services:
      - grafana
      - airflow
  server_a:
    host: 106.14.141.212
    role: 应用服务器
    config: 4核16GB
    note: 仅部署 node-exporter 监控，核心业务不动
  server_b:
    host: 139.196.34.92
    role: 测试服务器
    config: 4核16GB
    note: 禁止修改

# 项目特有例外
exceptions:
  - rule: 001-git.branch.feature
    override: 使用 feature/xxx、fix/xxx、hotfix/xxx 格式

# 项目特有规则
project_specific_rules:
  - id: jqdata.db.ddl_migration
    desc: 表结构变更必须写成迁移脚本（migrations/VXXX__description.sql），禁止手动 ALTER TABLE
    severity: error

  - id: jqdata.db.no_delete
    desc: 禁止 DELETE 操作，使用 ALTER TABLE ... DROP PARTITION 或 TTL
    severity: error

  - id: jqdata.db.write_batch
    desc: 批量插入 1000~10000 条/批，禁止单条写入
    severity: error

  - id: jqdata.db.query_constraints
    desc: 查询必须带 WHERE 条件、禁止 SELECT *、单次最多 1000 只标的、JOIN 优先在应用层
    severity: error

  - id: jqdata.data.no_export
    desc: 行情数据仅限 VPC 内网访问，禁止导出到公网/外发
    severity: error

  - id: jqdata.data.backup_encrypted
    desc: 归档的历史数据文件必须加密存储
    severity: warning

  - id: jqdata.jqdata.quota_protection
    desc: 正式账号日额度约 1000 万条，白天自限 550 万条，测试必须用本地数据集
    severity: error

  - id: jqdata.deploy.no_auto_deploy
    desc: push tag 不会自动部署，必须手动 SSH 执行 deploy.sh
    severity: error

  - id: jqdata.deploy.no_root
    desc: 使用 deploy 用户登录 C/D 服务器，禁止 root
    severity: error

  - id: jqdata.deploy.env_readonly
    desc: .env.production 在服务器本地，AI 禁止修改，只提供建议
    severity: error

  - id: jqdata.release.no_auto_release
    desc: AI 禁止擅自执行 release.sh，发版前必须逐项汇报获同意
    severity: error

  - id: jqdata.sensitive_log
    desc: 日志/打印输出必须脱敏（账号、密码、连接串等）
    severity: error
