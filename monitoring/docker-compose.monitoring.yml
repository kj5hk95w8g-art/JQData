# =============================================================================
# 监控栈 — Prometheus + cadvisor + node-exporter
# 部署在 D 服务器，Grafana 在 C 服务器连过来
# =============================================================================
name: jqdata-monitoring
services:

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: jqdata-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro"
      - "/data/prometheus:/prometheus"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks: [jqmon]

  # cadvisor: 容器监控，当前国内网络无法拉取镜像，待后续恢复后启用
  # image: google/cadvisor:v0.49.1
  # ports: ["18081:8080"]
  # ...

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: jqdata-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - "/proc:/host/proc:ro"
      - "/sys:/host/sys:ro"
      - "/:/rootfs:ro"
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks: [jqmon]

networks:
  jqmon:
    driver: bridge
