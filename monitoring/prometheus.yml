# =============================================================================
# Prometheus 配置
# 采集目标：Prometheus自身 + cadvisor(容器指标) + node-exporter(宿主机指标)
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    instance: 'jqdata-d'
    env: 'production'

rule_files:
  - "alert-rules.yml"

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'server-d'
    metrics_path: /metrics

  - job_name: 'node-exporter-a'
    static_configs:
      - targets: ['172.24.52.238:9100']
        labels:
          instance: 'server-a'
          role: 'application'
    metrics_path: /metrics
